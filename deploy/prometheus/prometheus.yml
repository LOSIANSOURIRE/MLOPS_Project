global:
  scrape_interval: 5s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - "/etc/prometheus/alert.rules.yml"

scrape_configs:
  - job_name: 'fastapi_monitoring'
    metrics_path: /metrics
    static_configs:
      - targets: ['backend:8000']
